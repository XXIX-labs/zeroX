[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "forge-cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fs_permissions = [{ access = "read", path = "./deployments" }]

[profile.fuzz]
fuzz = { runs = 10000, max_test_rejects = 65536 }

[profile.invariant]
invariant = { runs = 500, depth = 100 }

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 100, depth = 50 }

[rpc_endpoints]
avalanche = "${AVALANCHE_RPC_URL}"
fuji = "${FUJI_RPC_URL}"

[etherscan]
avalanche = { key = "${SNOWTRACE_API_KEY}", url = "https://api.snowtrace.io/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
